<h2>Book List</h2>

<table>

  <tr>
    <th>ID</th>
    <th>Title</th>
    <th>Author</th>
    <th>Publisher</th>
    <th>Date</th>
  </tr>

  <tr *ngFor="let book of books">
    <td>{{ book.id }}</td>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.publisher }}</td>
    <td>{{ book.createdDate | date:'yyyy-MM-dd' }}</td>
  </tr>

</table>

<h2>Add Book</h2>

<form (ngSubmit)="addBook()">

  <label>Title</label>
  <input type="text" [(ngModel)]="newBook.title" name="title" required>

  <br><br>

  <label>Author</label>
  <input type="text" [(ngModel)]="newBook.author" name="author" required>

  <br><br>

  <label>Publisher</label>
  <input type="text" [(ngModel)]="newBook.publisher" name="publisher" required>

  <br><br>

  <button type="submit">Save Book</button>

</form>

<hr>
