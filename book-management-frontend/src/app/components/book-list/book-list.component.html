<div class="max-w-5xl mx-auto mt-10 bg-white shadow-lg rounded-lg p-6">


  <h1 class="text-3xl font-extrabold text-gray-900 mb-6 text-center">
    Book Management Application
  </h1>


  <h2 class="text-2xl font-bold mb-4 text-gray-800">Book List</h2>

  <div class="flex gap-3 mb-4">
    <input 
      type="text"
      [(ngModel)]="searchText"
      placeholder="Search by Title"
      class="border border-gray-300 rounded px-3 py-2 w-full focus:outline-none focus:ring-2 focus:ring-blue-400"
    >

    <button 
      routerLink="/add-book"
      class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded"
    >
      Add Book
    </button>
  </div>

  <table class="w-full border border-gray-200 rounded">
    <thead class="bg-gray-100">
      <tr>
        <th class="text-left p-3">Title</th>
        <th class="text-left p-3">Author</th>
        <th class="text-left p-3">Isbn</th>
        <th class="text-left p-3">Action</th>
      </tr>
    </thead>

    <tbody>
      <tr 
        *ngFor="let book of filteredBooks"
        class="border-t hover:bg-gray-50"
      >
        <td class="p-3">{{book.title}}</td>
        <td class="p-3">{{book.author}}</td>
        <td class="p-3">{{book.isbn}}</td>

        <td class="p-3 flex gap-2">
          <button
            [routerLink]="['/edit-book', book.id]"
            class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded"
          >
            Edit
          </button>

          <button
            (click)="deleteBook(book.id)"
            class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded"
          >
            Delete
          </button>
        </td>
      </tr>

      <tr *ngIf="filteredBooks.length === 0">
        <td colspan="4" class="text-center p-4 text-gray-500">
          No books found
        </td>
      </tr>

    </tbody>
  </table>

</div>
