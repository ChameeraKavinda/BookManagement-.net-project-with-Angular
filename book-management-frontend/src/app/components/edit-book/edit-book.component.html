<div class="max-w-md mx-auto mt-10 bg-white shadow-lg rounded-lg p-6">

  <h2 class="text-2xl font-bold mb-6 text-gray-800">Edit Book</h2>

  <label class="text-sm text-gray-600">Title</label>
  <input
    type="text"
    [(ngModel)]="book.title"
    class="w-full border border-gray-300 rounded px-3 py-2 mb-3 focus:ring-2 focus:ring-blue-400"
  >

  <label class="text-sm text-gray-600">Author</label>
  <input
    type="text"
    [(ngModel)]="book.author"
    class="w-full border border-gray-300 rounded px-3 py-2 mb-3 focus:ring-2 focus:ring-blue-400"
  >

  <label class="text-sm text-gray-600">ISBN Number</label>
  <input
    type="text"
    [(ngModel)]="book.isbn"
    class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:ring-2 focus:ring-blue-400"
  >

  <button
    (click)="updateBook()"
    class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded"
  >
    Update Book
  </button>

</div>
