<div class="max-w-md mx-auto mt-10 bg-white shadow-lg rounded-lg p-6">

  <h2 class="text-2xl font-bold mb-6 text-gray-800">Add Book</h2>

  <input
    [(ngModel)]="book.title"
    placeholder="Title"
    class="w-full border border-gray-300 rounded px-3 py-2 mb-3 focus:ring-2 focus:ring-blue-400"
  >

  <input
    [(ngModel)]="book.author"
    placeholder="Author"
    class="w-full border border-gray-300 rounded px-3 py-2 mb-3 focus:ring-2 focus:ring-blue-400"
  >

  <input
    [(ngModel)]="book.isbn"
    placeholder="ISBN"
    class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:ring-2 focus:ring-blue-400"
  >

  <button
    (click)="saveBook()"
    class="w-full bg-green-500 hover:bg-green-600 text-white py-2 rounded"
  >
    Save Book
  </button>

</div>
